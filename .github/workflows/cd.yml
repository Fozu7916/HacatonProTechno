name: CD

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  deliver:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build release bundle
        run: |
          python -m pip install --upgrade pip
          mkdir -p dist
          zip -r "dist/hacatonprotechno-${GITHUB_REF_NAME}.zip" \
            app.py analytics database parser publisher custom_calendar.py custom_calendar_component requirements.txt README.md

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: hacatonprotechno-bundle
          path: dist/*.zip
          if-no-files-found: error
